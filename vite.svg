@import"https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap";:root{--bg-color: #080c0a;--panel-bg: rgba(22, 34, 29, .4);--glass-border: rgba(255, 255, 255, .08);--primary: #00e676;--primary-glow: rgba(0, 230, 118, .4);--text-main: #f0fdf4;--text-muted: #a7f3d0;--cat-biodegradable: #4caf50;--cat-recyclable: #2196f3;--cat-hazardous: #f44336;--cat-unknown: #9e9e9e;--danger-glow: rgba(244, 67, 54, .4);--info-glow: rgba(33, 150, 243, .4)}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Outfit,sans-serif;background-color:var(--bg-color);color:var(--text-main);background-image:radial-gradient(circle at 15% 50%,rgba(0,230,118,.1),transparent 30%),radial-gradient(circle at 85% 30%,rgba(33,150,243,.1),transparent 30%);background-attachment:fixed;min-height:100vh;overflow-x:hidden}#root{min-height:100vh;display:flex;flex-direction:column}.glass-panel{background:var(--panel-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:20px;box-shadow:0 8px 32px #0000004d}header{padding:24px;text-align:center;border-bottom:1px solid var(--glass-border);background:#080c0a99;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10}.title-glow{font-size:2.5rem;font-weight:700;text-shadow:0 0 20px var(--primary-glow);background:linear-gradient(135deg,#00e676,#b9fbc0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:inline-flex;align-items:center;gap:12px}.subtitle{color:var(--text-muted);font-size:1.1rem;margin-top:8px;font-weight:300}.main-container{max-width:1000px;margin:40px auto;padding:0 20px;width:100%;flex:1;display:flex;flex-direction:column;gap:24px}.tabs{display:flex;gap:16px;justify-content:center;margin-bottom:24px}.tab{background:var(--panel-bg);border:1px solid var(--glass-border);color:var(--text-muted);padding:12px 24px;border-radius:30px;font-family:inherit;font-size:1rem;font-weight:500;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:8px}.tab:hover{background:#ffffff0d;color:var(--text-main)}.tab.active{background:#00e67626;border-color:var(--primary);color:var(--primary);box-shadow:0 0 15px var(--primary-glow)}.btn{background:#00e6761a;color:var(--primary);border:1px solid var(--primary);padding:14px 28px;border-radius:14px;font-family:inherit;font-weight:600;font-size:1.1rem;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;justify-content:center;gap:10px;width:100%;max-width:300px;margin:0 auto}.btn:hover{background:var(--primary);color:#000;box-shadow:0 0 20px var(--primary-glow);transform:translateY(-2px)}.btn:active{transform:translateY(0)}.btn:disabled{opacity:.5;cursor:not-allowed;pointer-events:none}.scanner-container{position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;padding:30px}.video-wrapper,.image-wrapper{position:relative;width:100%;max-width:500px;aspect-ratio:4/3;border-radius:16px;overflow:hidden;background:#000;box-shadow:0 10px 30px #00000080;margin-bottom:24px}.video-wrapper video,.image-wrapper img{width:100%;height:100%;object-fit:cover}.scan-overlay{position:absolute;top:0;left:0;width:100%;height:2px;background:var(--primary);box-shadow:0 0 15px 5px var(--primary-glow);animation:scan-line 2s linear infinite;z-index:5}@keyframes scan-line{0%{top:0;opacity:0}10%{opacity:1}90%{opacity:1}to{top:100%;opacity:0}}.upload-area{border:2px dashed var(--glass-border);border-radius:16px;padding:60px 30px;text-align:center;cursor:pointer;transition:all .3s ease;width:100%;max-width:500px;margin:0 auto 24px}.upload-area:hover,.upload-area.active{border-color:var(--primary);background:#00e6760d}.upload-icon{color:var(--primary);margin-bottom:16px}.upload-text{font-size:1.2rem;color:var(--text-main);margin-bottom:8px}.upload-subtext{color:var(--text-muted);font-size:.9rem}.results-container{margin-top:30px;animation:slide-up .5s cubic-bezier(.16,1,.3,1)}@keyframes slide-up{0%{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}.result-card{padding:30px;display:flex;flex-direction:column;gap:20px}.result-header{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--glass-border);padding-bottom:20px}.result-title{font-size:2rem;font-weight:600;display:flex;align-items:center;gap:12px}.confidence{background:#ffffff1a;padding:6px 12px;border-radius:20px;font-size:.9rem;color:var(--text-muted)}.result-body{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}.info-box{background:#0003;padding:20px;border-radius:12px;border-left:4px solid var(--primary)}.info-box h4{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:1.1rem;color:var(--text-main)}.info-box p{color:var(--text-muted);line-height:1.6}.cat-biodegradable{color:var(--cat-biodegradable);text-shadow:0 0 10px rgba(76,175,80,.4)}.cat-recyclable{color:var(--cat-recyclable);text-shadow:0 0 10px rgba(33,150,243,.4)}.cat-hazardous{color:var(--cat-hazardous);text-shadow:0 0 10px rgba(244,67,54,.4)}.cat-unknown{color:var(--cat-unknown)}.border-biodegradable{border-left-color:var(--cat-biodegradable)!important}.border-recyclable{border-left-color:var(--cat-recyclable)!important}.border-hazardous{border-left-color:var(--cat-hazardous)!important}.loading-container{display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px}.spinner{width:40px;height:40px;border:4px solid rgba(0,230,118,.1);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.icon-spin{animation:spin 1s linear infinite}.game-container{padding:30px;text-align:center;max-width:800px;margin:0 auto;width:100%}.game-item-card{background:#0000004d;border:1px solid var(--glass-border);border-radius:16px;padding:40px;margin:20px 0 30px;min-height:180px;display:flex;flex-direction:column;justify-content:center;align-items:center}.game-item-card h3{font-size:2.5rem;color:var(--text-main);margin-bottom:20px;text-shadow:0 0 10px rgba(255,255,255,.2)}.game-bins{display:flex;justify-content:center;gap:20px;flex-wrap:wrap}.bin-btn{flex:1;min-width:150px;padding:20px;border-radius:16px;font-family:inherit;font-weight:600;font-size:1.1rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;transition:all .3s ease;border:2px solid transparent;color:#fff}.btn-bio{background:#4caf501a;border-color:#4caf504d}.btn-bio:hover{background:#4caf504d;border-color:var(--cat-biodegradable);box-shadow:0 0 20px #4caf5066}.btn-recycle{background:#2196f31a;border-color:#2196f34d}.btn-recycle:hover{background:#2196f34d;border-color:var(--cat-recyclable);box-shadow:0 0 20px #2196f366}.btn-hazard{background:#f443361a;border-color:#f443364d}.btn-hazard:hover{background:#f443364d;border-color:var(--cat-hazardous);box-shadow:0 0 20px #f4433666}.bin-btn:disabled{opacity:.6;cursor:not-allowed;transform:scale(.98)}.feedback{display:flex;flex-direction:column;align-items:center;gap:10px;padding:15px;border-radius:12px;animation:slide-up .3s ease}.feedback-correct{background:#4caf5033;color:#a5d6a7;border:1px solid var(--cat-biodegradable)}.feedback-wrong{background:#f4433633;color:#ef9a9a;border:1px solid var(--cat-hazardous)}.game-over{padding:40px}.game-over h3{font-size:2.5rem;color:var(--primary);margin-bottom:10px}.game-over p{font-size:1.5rem}
